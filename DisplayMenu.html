<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dean's Menu V3</title>
  <style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
    }
    
    img {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
    }
  </style>
</head>

<body>
  <img id="slideshowImage" alt="Scheduled slideshow image" />

  <script>
  const scheduleJson = 
//====================================================================
//  PASTE JSON SCHEDULE AFTER THIS
//====================================================================
{
  "generatedAt": "2026-07-09T17:15:38.709Z",
  "source": {
    "note": "Image paths are generated from the user-selected folder using webkitRelativePath.",
    "imageCount": 8
  },
  "schedule": [
    {
      "images": [
        {
          "id": "image-5",
          "name": "stories1",
          "fileName": "stories1.png",
          "path": "Content/stories1.png",
          "sizeBytes": 533870,
          "type": "image/png"
        },
        {
          "id": "image-6",
          "name": "stories2",
          "fileName": "stories2.png",
          "path": "Content/stories2.png",
          "sizeBytes": 778687,
          "type": "image/png"
        },
        {
          "id": "image-7",
          "name": "stories3",
          "fileName": "stories3.png",
          "path": "Content/stories3.png",
          "sizeBytes": 642565,
          "type": "image/png"
        }
      ],
      "days": [
        "Thursday"
      ],
      "hours": [
        12
      ]
    }
  ]
}
//====================================================================
//  PASTE JSON SCHEDULE BEFORE THIS
//====================================================================
  ;

  /* Time to display each image (milliseconds) */
  const imageDuration = 40000; // 40 seconds

  /* Time between checking the schedule for a new hour/day.  This is
     a time value in milliseconds.
  */
  let refreshTimeInterval = 300000;  // 5 minutes

  let scheduleData = null;
  let activeImages = [];
  let currentImageIndex = 0;
  let slideshowTimer = null;
  let scheduleCheckTimer = null;

  const slideshowImage = document.getElementById("slideshowImage");

  console.log(scheduleJson);

  /**
   * Load schedule JSON from a JavaScript object.
   */
  function loadSchedule(scheduleJson) {
    scheduleData = scheduleJson;

    refreshActiveImages();
    startSlideshow();
  
    // Re-check the schedule in case the hour/day changes.
    if (scheduleCheckTimer) {
      clearInterval(scheduleCheckTimer);
    }
  
    scheduleCheckTimer = setInterval(() => {
      refreshActiveImages();
      startSlideshow();
    }, refreshTimeInterval);
  }


  /**
   * Find images that should currently be shown based on day and hour.
   */
  function refreshActiveImages() {
    if (!scheduleData || !Array.isArray(scheduleData.schedule)) {
      activeImages = [];
      return;
    }
  
    const now = new Date();
    const currentDay = getCurrentDayName(now);
    const currentHour = now.getHours();
  
    const matchingRules = scheduleData.schedule.filter(rule => {
      const dayMatches = rule.days.includes(currentDay);
      const hourMatches = rule.hours.includes(currentHour);
  
      return dayMatches && hourMatches;
    });
  
    activeImages = matchingRules.flatMap(rule => rule.images || []);
  
    currentImageIndex = 0;
  
    console.log("Current day:", currentDay);
    console.log("Current hour:", currentHour);
    console.log("Active images:", activeImages);
  }
  
  /**
   * Start or restart the slideshow.
   */
  function startSlideshow() {
    if (slideshowTimer) {
      clearTimeout(slideshowTimer);
      slideshowTimer = null;
    }
  
    if (!activeImages.length) {
      showNoScheduledImage();
      return;
    }
  
    showNextImage();
  }
  
  /**
   * Show the next image and schedule the following one.
   */
  function showNextImage() {
    if (!activeImages.length) {
      showNoScheduledImage();
      return;
    }
  
    const image = activeImages[currentImageIndex];
  
    slideshowImage.src = image.path;
    slideshowImage.alt = image.name || image.fileName || "Scheduled image";
  
    currentImageIndex = (currentImageIndex + 1) % activeImages.length;
  
    slideshowTimer = setTimeout(() => {
      showNextImage();
    }, imageDuration);
  }
  
  /**
   * Display fallback behavior when no rule matches the current time.
   */
  function showNoScheduledImage() {
    slideshowImage.removeAttribute("src");
    slideshowImage.alt = "No image scheduled for the current time";
  
    console.log("No images scheduled for the current day/hour.");
  }
  
  /**
   * Convert current Date into the same day names used by the JSON.
   */
  function getCurrentDayName(date) {
    const days = [
      "Sunday",
      "Monday",
      "Tuesday",
      "Wednesday",
      "Thursday",
      "Friday",
      "Saturday"
    ];
  
    return days[date.getDay()];
  }
  
  loadSchedule(scheduleJson);
  
  </script>

</body>
</html>
